version: '3.8'

services:
  # --- Backend API Server ---
  api:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_KEY=${API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-luxor9-factory-secret}
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Frontend (Static served by nginx) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: always

volumes:
  api-data:
