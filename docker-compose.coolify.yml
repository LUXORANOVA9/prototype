# Luxor9 Ai Factory — Coolify Deployment
# One-click deploy on your own server
# 
# SETUP:
# 1. Install Coolify on your server: curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash
# 2. In Coolify dashboard, click "New Resource" → "Docker Compose"
# 3. Paste this file
# 4. Set environment variables (API_KEY, JWT_SECRET)
# 5. Deploy!

version: '3.8'

services:
  # === BACKEND API SERVER ===
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --production && node server.js"
    environment:
      - PORT=8080
      - API_KEY=${API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-luxor9-factory-secret-change-me}
      - NODE_ENV=production
    volumes:
      - ./service:/app
      - api-data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  # === FRONTEND (Nginx) ===
  web:
    image: nginx:alpine
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: always

volumes:
  api-data:
